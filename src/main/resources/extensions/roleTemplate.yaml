apiVersion: v1alpha1
kind: Role
metadata:
  name: role-template-link-view
  labels:
    halo.run/role-template: "true"
  annotations:
    rbac.authorization.halo.run/module: "链接"
    rbac.authorization.halo.run/display-name: "链接查看"
    rbac.authorization.halo.run/ui-permissions: |
      ["plugin:links:view"]
rules:
  - apiGroups: [ "core.halo.run", "console.api.link.halo.run" ]
    resources: [ "links", "linkgroups" ]
    verbs: [ "get", "list" ]
  - apiGroups: [ "console.api.link.halo.run" ]
    resources: [ "rss/items", "rss/discovery" ]
    resourceNames: [ "-" ]
    verbs: [ "get" ]
  - apiGroups: [ "console.api.link.halo.run" ]
    resources: [ "rss/items/read", "rss/items/favorite", "rss/items/read-later" ]
    resourceNames: [ "-" ]
    verbs: [ "create" ]
---
apiVersion: v1alpha1
kind: Role
metadata:
  name: role-template-link-manage
  labels:
    halo.run/role-template: "true"
  annotations:
    rbac.authorization.halo.run/module: "链接"
    rbac.authorization.halo.run/display-name: "链接管理"
    rbac.authorization.halo.run/ui-permissions: |
      ["plugin:links:manage"]
    rbac.authorization.halo.run/dependencies: |
      ["role-template-link-view"]
rules:
  - apiGroups: [ "core.halo.run", "console.api.link.halo.run" ]
    resources: [ "links", "linkgroups" ]
    verbs: [ "create", "patch", "update", "delete", "deletecollection" ]
  - apiGroups: [ "console.api.link.halo.run" ]
    resources: [ "links/sort", "linkgroups/sort" ]
    resourceNames: [ "-" ]
    verbs: [ "create" ]
  - apiGroups: [ "console.api.link.halo.run" ]
    resources: [ "links/detail" ]
    resourceNames: [ "-" ]
    verbs: [ "get" ]
  - apiGroups: [ "console.api.link.halo.run" ]
    resources: [ "links/rss/refresh", "rss/cleanup" ]
    resourceNames: [ "-" ]
    verbs: [ "create" ]
---
apiVersion: v1alpha1
kind: Role
metadata:
  name: role-template-link-anonymous
  labels:
    halo.run/role-template: "true"
    halo.run/hidden: "true"
    rbac.authorization.halo.run/aggregate-to-anonymous: "true"
rules:
  - apiGroups: [ "api.link.halo.run" ]
    resources: [ "links", "linkgroups", "links/random", "links/count" ]
    verbs: [ "get", "list" ]
